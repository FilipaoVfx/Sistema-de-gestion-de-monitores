<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Crear contrasena</title>
  </head>
  <body>
    <h1>Crear contrasena</h1>
    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar contrasena</button>
      </form>
    {% else %}
      <p>El enlace no es valido o ya fue usado.</p>
    {% endif %}
  </body>
</html>
