<!--{# 
  chat_panel.html — Widget flotante moderno de chat tipo Intercom/Zendesk.
  Se incluye en admin_view.html y crear_asignacion.html
  
  Requiere en context:
  - admin_username: nombre de usuario del admin logueado
  
  Características:
  - Burbuja flotante fija en esquina inferior derecha (estado colapsado)
  - Modal elegante que se abre al hacer click (estado expandido)
  - Mensajes diferenciados (usuario vs bot) con burbujas de colores
  - Animaciones suaves (slide-up, fade-in, typing indicator)
  - Todo CSS/JS scopeado con prefijo .aia-chat- para evitar conflictos
#}-->

<!-- Estructura HTML del Widget Flotante -->
<div class="aia-chat-wrapper" id="aiaChatWrapper">
  <!-- Burbuja flotante (estado colapsado) -->
  <button 
    class="aia-chat-bubble" 
    id="aiaChatBubble"
    title="Abrir asistente IA"
    aria-label="Abrir asistente IA"
  >
    <svg class="aia-chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <span class="aia-chat-pulse"></span>
  </button>

  <!-- Modal de chat (estado expandido) -->
  <div class="aia-chat-modal" id="aiaChatModal">
    <!-- Encabezado -->
    <div class="aia-chat-header">
      <div class="aia-chat-header-content">
        <h3 class="aia-chat-title">Asistente IA</h3>
        <p class="aia-chat-subtitle">Monitores</p>
      </div>
      <button 
        class="aia-chat-close-btn" 
        id="aiaChatCloseBtn"
        aria-label="Cerrar chat"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Área de mensajes -->
    <div class="aia-chat-messages" id="aiaChatMessages">
      <div class="aia-chat-welcome">
        <div class="aia-chat-welcome-icon">👋</div>
        <div class="aia-chat-welcome-text">
          <p class="aia-chat-welcome-title">¡Bienvenido!</p>
          <p class="aia-chat-welcome-subtitle">Soy tu asistente de IA. Puedo ayudarte con preguntas sobre monitores, asignaciones y más.</p>
        </div>
      </div>
    </div>

    <!-- Input y botón de envío -->
    <div class="aia-chat-footer">
      <div class="aia-chat-input-wrapper">
        <input 
          type="text" 
          id="aiaChatInput"
          class="aia-chat-input"
          placeholder="Escribe tu pregunta..."
          autocomplete="off"
        />
        <button 
          class="aia-chat-send-btn" 
          id="aiaChatSendBtn"
          aria-label="Enviar mensaje"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Estilos Scopeados -->
<style>
  /* Contenedor Principal */
  .aia-chat-wrapper {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --aia-primary: #667eea;
    --aia-primary-dark: #5568d3;
    --aia-primary-light: #f0f4ff;
    --aia-secondary: #764ba2;
    --aia-text-primary: #1a1a1a;
    --aia-text-secondary: #666;
    --aia-border: #e5e5e5;
    --aia-background: #ffffff;
    --aia-user-bg: #667eea;
    --aia-user-text: #ffffff;
    --aia-bot-bg: #f0f0f5;
    --aia-bot-text: #333;
  }

  /* Burbuja Flotante */
  .aia-chat-bubble {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--aia-primary) 0%, var(--aia-secondary) 100%);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    z-index: 999;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    outline: none;
  }

  .aia-chat-bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  }

  .aia-chat-bubble:active {
    transform: scale(0.95);
  }

  .aia-chat-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  /* Pulso de animación en la burbuja */
  .aia-chat-pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid var(--aia-primary);
    opacity: 0;
    animation: aia-pulse 2s infinite;
  }

  @keyframes aia-pulse {
    0% {
      transform: scale(1);
      opacity: 0.8;
    }
    100% {
      transform: scale(1.3);
      opacity: 0;
    }
  }

  /* Modal de Chat */
  .aia-chat-modal {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 600px;
    background: var(--aia-background);
    border-radius: 12px;
    box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .aia-chat-modal.aia-chat-open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* Encabezado */
  .aia-chat-header {
    background: linear-gradient(135deg, var(--aia-primary) 0%, var(--aia-secondary) 100%);
    color: white;
    padding: 16px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .aia-chat-header-content {
    flex: 1;
  }

  .aia-chat-title {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .aia-chat-subtitle {
    margin: 2px 0 0 0;
    font-size: 12px;
    opacity: 0.9;
  }

  .aia-chat-close-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    outline: none;
  }

  .aia-chat-close-btn:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  .aia-chat-close-btn svg {
    width: 18px;
    height: 18px;
  }

  /* Área de Mensajes */
  .aia-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f9fafb;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .aia-chat-messages::-webkit-scrollbar {
    width: 6px;
  }

  .aia-chat-messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .aia-chat-messages::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
  }

  .aia-chat-messages::-webkit-scrollbar-thumb:hover {
    background: #999;
  }

  /* Mensaje de Bienvenida */
  .aia-chat-welcome {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: aia-fade-in 0.5s ease-in;
  }

  .aia-chat-welcome-icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  .aia-chat-welcome-text {
    flex: 1;
    background: white;
    padding: 12px;
    border-radius: 8px;
    border-left: 3px solid var(--aia-primary);
  }

  .aia-chat-welcome-title {
    margin: 0 0 4px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--aia-text-primary);
  }

  .aia-chat-welcome-subtitle {
    margin: 0;
    font-size: 12px;
    color: var(--aia-text-secondary);
    line-height: 1.5;
  }

  /* Mensajes */
  .aia-chat-message {
    display: flex;
    animation: aia-message-in 0.3s ease-out;
  }

  .aia-chat-message.aia-chat-user {
    justify-content: flex-end;
  }

  .aia-chat-message.aia-chat-bot {
    justify-content: flex-start;
  }

  .aia-chat-message-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    word-wrap: break-word;
    font-size: 13px;
    line-height: 1.4;
  }

  .aia-chat-user .aia-chat-message-bubble {
    background: var(--aia-user-bg);
    color: var(--aia-user-text);
    border-bottom-right-radius: 4px;
  }

  .aia-chat-bot .aia-chat-message-bubble {
    background: var(--aia-bot-bg);
    color: var(--aia-bot-text);
    border-bottom-left-radius: 4px;
  }

  /* Typing Indicator */
  .aia-chat-typing {
    display: flex;
    gap: 4px;
    align-items: center;
    background: var(--aia-bot-bg);
    padding: 10px 14px;
    border-radius: 10px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .aia-chat-typing-dot {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    animation: aia-typing-dot 1.4s infinite;
  }

  .aia-chat-typing-dot:nth-child(2) {
    animation-delay: 0.2s;
  }

  .aia-chat-typing-dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes aia-typing-dot {
    0%, 60%, 100% {
      opacity: 0.3;
      transform: translateY(0);
    }
    30% {
      opacity: 1;
      transform: translateY(-8px);
    }
  }

  @keyframes aia-message-in {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes aia-fade-in {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* Footer (Input) */
  .aia-chat-footer {
    padding: 12px;
    border-top: 1px solid var(--aia-border);
    background: var(--aia-background);
    border-radius: 0 0 12px 12px;
    flex-shrink: 0;
  }

  .aia-chat-input-wrapper {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .aia-chat-input {
    flex: 1;
    border: 1px solid var(--aia-border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    background: #fafafa;
  }

  .aia-chat-input:focus {
    border-color: var(--aia-primary);
    background: white;
  }

  .aia-chat-input::placeholder {
    color: #999;
  }

  .aia-chat-send-btn {
    background: var(--aia-primary);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    outline: none;
  }

  .aia-chat-send-btn:hover {
    background: var(--aia-primary-dark);
    transform: scale(1.05);
  }

  .aia-chat-send-btn:active {
    transform: scale(0.95);
  }

  .aia-chat-send-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .aia-chat-send-btn svg {
    width: 18px;
    height: 18px;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .aia-chat-modal {
      width: calc(100% - 32px);
      height: calc(100vh - 100px);
      bottom: auto;
      top: 16px;
      right: 16px;
      left: 16px;
    }

    .aia-chat-bubble {
      bottom: 16px;
      right: 16px;
    }
  }
</style>

<!-- JavaScript del Widget -->
<script>
  (function() {
    'use strict';

    // DOM Elements
    const bubble = document.getElementById('aiaChatBubble');
    const modal = document.getElementById('aiaChatModal');
    const closeBtn = document.getElementById('aiaChatCloseBtn');
    const messagesContainer = document.getElementById('aiaChatMessages');
    const input = document.getElementById('aiaChatInput');
    const sendBtn = document.getElementById('aiaChatSendBtn');

    // CSRF Token
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || getCookie('csrftoken');
    const adminUsername = '{{ admin_username }}';

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // Abrir/Cerrar Modal
    function openModal() {
      modal.classList.add('aia-chat-open');
      input.focus();
    }

    function closeModal() {
      modal.classList.remove('aia-chat-open');
    }

    // Agregar Mensaje al Chat
    function addMessage(text, sender = 'user') {
      const messageDiv = document.createElement('div');
      messageDiv.className = `aia-chat-message aia-chat-${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'aia-chat-message-bubble';
      bubble.textContent = text;

      messageDiv.appendChild(bubble);
      messagesContainer.appendChild(messageDiv);

      // Auto-scroll al fondo
      setTimeout(() => {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, 0);
    }

    // Mostrar Typing Indicator
    function showTyping() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'aia-chat-message aia-chat-bot';
      messageDiv.id = 'aia-typing-indicator';

      const typing = document.createElement('div');
      typing.className = 'aia-chat-typing';
      typing.innerHTML = '<div class="aia-chat-typing-dot"></div><div class="aia-chat-typing-dot"></div><div class="aia-chat-typing-dot"></div>';

      messageDiv.appendChild(typing);
      messagesContainer.appendChild(messageDiv);

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Remover Typing Indicator
    function removeTyping() {
      const typing = document.getElementById('aia-typing-indicator');
      if (typing) typing.remove();
    }

    // Remover Mensaje de Bienvenida
    function removeWelcome() {
      const welcome = messagesContainer.querySelector('.aia-chat-welcome');
      if (welcome) welcome.remove();
    }

    // Enviar Mensaje
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      removeWelcome();
      addMessage(message, 'user');
      input.value = '';
      sendBtn.disabled = true;
      input.disabled = true;

      showTyping();

      try {
        const response = await fetch('{% url "ai_chat_api" %}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken,
          },
          body: JSON.stringify({ message: message }),
        });

        const data = await response.json();
        removeTyping();

        if (response.ok && data.success) {
          addMessage(data.response, 'bot');
        } else {
          addMessage(`❌ Error: ${data.error || 'No se pudo obtener respuesta'}`, 'bot');
        }
      } catch (error) {
        removeTyping();
        addMessage(`❌ Error de conexión: ${error.message}`, 'bot');
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    // Event Listeners
    bubble.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Cerrar modal al presionar Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('aia-chat-open')) {
        closeModal();
      }
    });
  })();
</script>
