<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Crear monitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Invitar monitor</h1>
              <form method="post" novalidate>
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-3">
                  <label class="form-label" for="id_first_name">Nombre</label>
                  {{ form.first_name }}
                </div>
                <div class="mb-3">
                  <label class="form-label" for="id_last_name">Apellido</label>
                  {{ form.last_name }}
                </div>
                <div class="mb-3">
                  <label class="form-label" for="id_cedula">Cedula</label>
                  {{ form.cedula }}
                </div>
                <div class="mb-3">
                  <label class="form-label" for="id_email">Email</label>
                  {{ form.email }}
                </div>
                <div class="mb-3">
                  <label class="form-label" for="id_telefono">Telefono</label>
                  {{ form.telefono }}
                </div>
                <button class="btn btn-primary" type="submit">Enviar invitacion</button>
                <a class="btn btn-link" href="{% url 'admin_dashboard' %}">Volver</a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
