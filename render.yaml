databases:
  - name: sgmsc-db
    databaseName: sgmsc
    user: sgmsc_user
    plan: free

services:
  - type: web
    name: sgmsc-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn sgmsc.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: sgmsc-db
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_JEFE_DEPARTAMENTO
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SITE_URL
        sync: false